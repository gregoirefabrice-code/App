<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle de Toupies</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #111; overflow: hidden; height: 100vh; display: flex; justify-content: center; }
        
        #root { 
            display: flex; flex-direction: column; width: 100%; max-width: 400px; 
            background: #fff; height: 100vh; position: relative;
        }

        /* HEADER & STATS */
        #header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #ddd; background: #fff; z-index: 10; }
        #units-display { font-weight: bold; color: #534AB7; }
        #level-info { font-size: 12px; color: #888; }
        #shop-btn { background: none; border: none; font-size: 20px; cursor: pointer; }

        /* HP BARS */
        #hp-section { display: flex; justify-content: space-between; padding: 10px; background: #f8f8f8; border-bottom: 1px solid #eee; }
        .hp-col { flex: 1; }
        .hp-bar { width: 100%; height: 10px; background: #e5e5ea; border-radius: 5px; overflow: hidden; margin-top: 4px; }
        .hp-fill { height: 100%; transition: width 0.3s ease; }
        #p-hp-fill { background: #534AB7; }
        #b-hp-fill { background: #D85A30; }
        .hp-name { font-size: 11px; font-weight: bold; text-transform: uppercase; }

        /* ARENA */
        #arena-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #0d0d1a; overflow: hidden; position: relative; }
        #arena { 
            position: relative; width: 320px; height: 320px; border-radius: 50%; 
            background: radial-gradient(circle, #1a1a3e, #0d0d1a 80%); 
            border: 6px solid #534AB7; touch-action: none;
        }

        .toupie { 
            position: absolute; width: 44px; height: 44px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            z-index: 2; transition: transform 0.1s linear;
        }
        #p-toupie { background: radial-gradient(circle, #7F77DD, #3C3489); border: 2px solid #fff; }
        #b-toupie { background: radial-gradient(circle, #f0997b, #d85a30); border: 2px solid #fff; }

        /* OVERLAYS */
        .overlay { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 100; text-align: center; color: white;
            border-radius: 50%;
        }
        .overlay.show { display: flex; }
        .overlay h2 { margin-bottom: 15px; }
        
        /* BOUTONS */
        button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #534AB7; color: white; }
        .btn-primary:disabled { background: #ccc; }

        #spin-wrap { padding: 15px; background: #fff; border-top: 1px solid #ddd; }
        #spin-btn { width: 100%; height: 50px; font-size: 18px; }

        /* BASKET */
        #basket-wrap { padding: 10px; background: #f9f9f9; border-top: 1px solid #eee; overflow-x: auto; }
        #basket { display: flex; gap: 10px; padding-bottom: 5px; }
        .basket-item { 
            min-width: 60px; padding: 8px; background: #fff; border: 2px solid #eee; 
            border-radius: 8px; text-align: center; font-size: 10px;
        }
        .basket-item.active { border-color: #534AB7; background: #EEEDFE; }

        /* MODAL */
        .modal-bg { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            z-index: 200; display: none; align-items: center; justify-content: center; 
        }
        .modal-bg.show { display: flex; }
        .modal-card { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; }
        .modal-input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; }

        .dmg-popup { position: absolute; font-weight: bold; color: red; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 50; }
        @keyframes floatUp { to { transform: translateY(-40px); opacity: 0; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 0.3s linear infinite; }
    </style>
</head>
<body>

<div id="root">
    <div id="header">
        <div id="units-display">💎 <span id="units-val">0</span></div>
        <div id="level-info">Niveau 1</div>
        <button id="shop-btn">🛒</button>
    </div>

    <div id="hp-section">
        <div class="hp-col">
            <div class="hp-name" id="p-name">Joueur</div>
            <div class="hp-bar"><div id="p-hp-fill" class="hp-fill" style="width:100%"></div></div>
        </div>
        <div style="padding: 0 10px; font-weight: bold; align-self: flex-end;">VS</div>
        <div class="hp-col" style="text-align: right;">
            <div class="hp-name">Robot</div>
            <div class="hp-bar"><div id="b-hp-fill" class="hp-fill" style="width:100%"></div></div>
        </div>
    </div>

    <div id="arena-wrap">
        <div id="arena">
            <div id="p-toupie" class="toupie">🌀</div>
            <div id="b-toupie" class="toupie">🤖</div>

            <div id="result-overlay" class="overlay">
                <h2 id="result-title">Gagné !</h2>
                <p id="result-sub" style="margin-bottom: 20px;"></p>
                <button id="result-btn" class="btn-primary">REJOUER</button>
            </div>

            <div id="cd-overlay" class="overlay">
                <h1 id="cd-text" style="font-size: 80px;">3</h1>
            </div>
        </div>
    </div>

    <div id="spin-wrap">
        <button id="spin-btn" class="btn-primary">🌀 FAIRE TOURNER !</button>
    </div>

    <div id="basket-wrap">
        <div id="basket">
            <div class="basket-item active" onclick="selectSlot(-1, this)">
                <div style="font-size: 20px;">🌀</div><div>Base</div>
            </div>
        </div>
    </div>
</div>

<div id="name-modal" class="modal-bg show">
    <div class="modal-card">
        <h2>Ton Nom ?</h2>
        <input type="text" id="name-input" class="modal-input" placeholder="Pseudo..." maxlength="12">
        <button id="name-confirm" class="btn-primary" style="width: 100%;">C'EST PARTI !</button>
    </div>
</div>

<script>
    // --- VARIABLES GLOBALES ---
    let player = { name: "", units: 0, level: 1, basket: [], activeIdx: -1 };
    let gameActive = false;
    let pHp = 100, bHp = 100;
    let px = 60, py = 160, bx = 260, by = 160;
    let pvx = 0, pvy = 0, bvx = 0, bvy = 0;
    let dragging = false;
    let raf;

    const CX = 160, CY = 160, R = 145, T_R = 22;

    // --- DOM ELEMENTS ---
    const pEl = document.getElementById('p-toupie');
    const bEl = document.getElementById('b-toupie');
    const resOverlay = document.getElementById('result-overlay');
    const spinBtn = document.getElementById('spin-btn');

    // --- SAUVEGARDE ---
    function save() { localStorage.setItem('toupie_save', JSON.stringify(player)); }
    function load() {
        const data = localStorage.getItem('toupie_save');
        if(data) {
            player = JSON.parse(data);
            updateUI();
            document.getElementById('name-modal').classList.remove('show');
        }
    }

    function updateUI() {
        document.getElementById('units-val').textContent = player.units;
        document.getElementById('p-name').textContent = player.name;
        document.getElementById('level-info').textContent = "Niveau " + player.level;
    }

    // --- INITIALISATION ---
    document.getElementById('name-confirm').onclick = () => {
        const val = document.getElementById('name-input').value.trim();
        if(val) {
            player.name = val;
            save();
            updateUI();
            document.getElementById('name-modal').classList.remove('show');
        }
    };

    // --- LOGIQUE DE JEU ---
    function startCountdown() {
        if(gameActive) return;
        spinBtn.disabled = true;
        const cd = document.getElementById('cd-overlay');
        const txt = document.getElementById('cd-text');
        cd.classList.add('show');
        
        let count = 3;
        txt.textContent = count;
        
        const timer = setInterval(() => {
            count--;
            if(count > 0) txt.textContent = count;
            else if(count === 0) txt.textContent = "GO!";
            else {
                clearInterval(timer);
                cd.classList.remove('show');
                launch();
            }
        }, 800);
    }

    function launch() {
        gameActive = true;
        pHp = 100; bHp = 100;
        updateHpBars();
        pEl.classList.add('spinning');
        bEl.classList.add('spinning');
        
        // Impulsion initiale
        pvx = 5; bvx = -5;
        loop();
    }

    function updateHpBars() {
        document.getElementById('p-hp-fill').style.width = pHp + "%";
        document.getElementById('b-hp-fill').style.width = bHp + "%";
    }

    function loop() {
        if(!gameActive) return;

        // Physique Bot
        const angle = Math.atan2(py - by, px - bx);
        bvx += Math.cos(angle) * 0.2;
        bvy += Math.sin(angle) * 0.2;

        // Friction
        pvx *= 0.98; pvy *= 0.98;
        bvx *= 0.98; bvy *= 0.98;

        px += pvx; py += pvy;
        bx += bvx; by += bvy;

        // Collision Murs (Cercle)
        [px, py, pvx, pvy] = checkWall(px, py, pvx, pvy, 'p');
        [bx, by, bvx, bvy] = checkWall(bx, by, bvx, bvy, 'b');

        // Collision Toupies
        const dx = px - bx, dy = py - by;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < T_R * 2) {
            // Rebond
            const nx = dx / dist, ny = dy / dist;
            pvx = nx * 8; pvy = ny * 8;
            bvx = -nx * 8; bvy = -ny * 8;
            
            // Dégâts
            pHp -= 5; bHp -= 8;
            updateHpBars();
        }

        // Update Visuel
        pEl.style.transform = `translate(${px - T_R}px, ${py - T_R}px)`;
        bEl.style.transform = `translate(${bx - T_R}px, ${by - T_R}px)`;

        if(pHp <= 0 || bHp <= 0) return endGame(bHp <= 0);
        
        raf = requestAnimationFrame(loop);
    }

    function checkWall(x, y, vx, vy, who) {
        const dx = x - CX, dy = y - CY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist > R - T_R) {
            const angle = Math.atan2(dy, dx);
            x = CX + Math.cos(angle) * (R - T_R);
            y = CY + Math.sin(angle) * (R - T_R);
            return [x, y, -vx * 0.8, -vy * 0.8];
        }
        return [x, y, vx, vy];
    }

    function endGame(win) {
        gameActive = false;
        cancelAnimationFrame(raf);
        pEl.classList.remove('spinning');
        bEl.classList.remove('spinning');
        
        const title = document.getElementById('result-title');
        if(win) {
            player.units += 5;
            title.textContent = "VICTOIRE ! 🏆";
            document.getElementById('result-sub').textContent = "+5 Diamants";
        } else {
            title.textContent = "DÉFAITE... 💀";
            document.getElementById('result-sub').textContent = "Réessaie encore !";
        }
        save();
        updateUI();
        resOverlay.classList.add('show');
    }

    function reset() {
        resOverlay.classList.remove('show');
        px = 60; py = 160; bx = 260; by = 160;
        pvx = 0; pvy = 0; bvx = 0; bvy = 0;
        pHp = 100; bHp = 100;
        updateHpBars();
        pEl.style.transform = `translate(${px - T_R}px, ${py - T_R}px)`;
        bEl.style.transform = `translate(${bx - T_R}px, ${by - T_R}px)`;
        spinBtn.disabled = false;
    }

    // --- CONTROLES TACTILES ---
    const arena = document.getElementById('arena');
    function handleTouch(e) {
        if(!gameActive) return;
        const rect = arena.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;
        
        // Attirance vers le doigt
        pvx += (tx - px) * 0.05;
        pvy += (ty - py) * 0.05;
    }

    arena.addEventListener('touchstart', (e) => { e.preventDefault(); handleTouch(e); });
    arena.addEventListener('touchmove', (e) => { e.preventDefault(); handleTouch(e); });
    arena.addEventListener('mousemove', (e) => { if(e.buttons) handleTouch(e); });

    // BOUTON REJOUER (Fix Mobile)
    const resBtn = document.getElementById('result-btn');
    resBtn.addEventListener('click', reset);
    resBtn.addEventListener('touchstart', (e) => { e.preventDefault(); reset(); });

    // BOUTON Lancer
    spinBtn.addEventListener('click', startCountdown);
    spinBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startCountdown(); });

    // INIT
    load();
    reset();
</script>

</body>
</html>
